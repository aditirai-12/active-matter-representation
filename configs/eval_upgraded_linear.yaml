defaults:
  - dataset: active_matter
  - model: conv_small
  - ft: linear

dataset:
  num_frames: 16
  gap_frames: 8

model:
  objective: "jepa"
  dims: [32, 64, 128, 256, 256]
  num_res_blocks: [3, 3, 3, 9, 3]
  use_channel_stem: true
  use_temporal_mixer: true
  preserve_temporal: true

train:
  run_name: "upgraded-jepa"
  num_epochs: 5
  batch_size: 4
  report_every: 100
  save_every: 2
  include_labels: false
  sim_coeff: 10
  std_coeff: 10
  cov_coeff: 1
  predict_n_steps: false
  lr_scheduler: "cosine"
  lr_scheduler_warmup_epochs: 2
  min_lr: 1e-6
  lr: 1e-3
  weight_decay: 0.05
  noise_std: 1.0
  distributed: false

ft:
  num_epochs: 100
  lr: 1e-3
  batch_size: 16
  report_every: 100
  save_every: 10
  head_type: linear
  embeddings_dir: "./embeddings/upgraded"
  task: "regression"
  lr_scheduler: "cosine"
  lr_scheduler_warmup_epochs: 2
  min_lr: 0
  weight_decay: 0.01
  noise_std: 0.0
  run_name: "upgraded-linear-probe"
  distributed: false

out_path: "./checkpoints/upgraded-linear-probe"
cache_path: "./dataset_cache"